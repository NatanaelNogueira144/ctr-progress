<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTR Progress - Goals Report</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="background-wrapper">
    <img id="background" src="../assets/images/tracks/Menu.png" alt="Background" class="background-image" />
  </div>

  <main class="content">
    <div class="card-group">
      <div class="card">
        <span class="orange">All Goals: </span>
        <div id="all-goals-empty-bar" class="empty-bar">
          <div id="all-goals-filled-bar" class="filled-bar orange"></div>
          <span class="white"></span>
        </div>
        <hr>
        <span class="orange">Grind Best Goals: </span>
        <div id="grind-best-goals-empty-bar" class="empty-bar">
          <div id="grind-best-goals-filled-bar" class="filled-bar orange"></div>
          <span class="white"></span>
        </div>
        <hr>
        <span class="orange">Relic Race Goals: </span>
        <div id="relic-race-goals-empty-bar" class="empty-bar">
          <div id="relic-race-goals-filled-bar" class="filled-bar orange"></div>
          <span class="white"></span>
        </div>
        <hr>
        <span class="orange">Speed Char. Goals: </span>
        <div id="speed-char-goals-empty-bar" class="empty-bar">
          <div id="speed-char-goals-filled-bar" class="filled-bar orange"></div>
          <span class="white"></span>
        </div>
        <hr>
        <span class="orange">Accel. Char. Goals: </span>
        <div id="accel-char-goals-empty-bar" class="empty-bar">
          <div id="accel-char-goals-filled-bar" class="filled-bar orange"></div>
          <span class="white"></span>
        </div>
        <hr>
        <span class="orange">Balanced Char. Goals: </span>
        <div id="balanced-char-goals-empty-bar" class="empty-bar">
          <div id="balanced-char-goals-filled-bar" class="filled-bar orange"></div>
          <span class="white"></span>
        </div>
        <hr>
        <span class="orange">Turn Char. Goals: </span>
        <div id="turn-char-goals-empty-bar" class="empty-bar">
          <div id="turn-char-goals-filled-bar" class="filled-bar orange"></div>
          <span class="white"></span>
        </div>
        <hr>
        <span class="orange">Skipless Goals: </span>
        <div id="skipless-goals-empty-bar" class="empty-bar">
          <div id="skipless-goals-filled-bar" class="filled-bar orange"></div>
          <span class="white"></span>
        </div>
        <hr>
        <span class="orange">Classic Goals: </span>
        <div id="classic-goals-empty-bar" class="empty-bar">
          <div id="classic-goals-filled-bar" class="filled-bar orange"></div>
          <span class="white"></span>
        </div>
      </div>
    </div>
  </main>

  <script src="../assets/js/controls.js"></script>
  <script src="../assets/js/utils/date-utils.js"></script>
  <script src="../assets/js/utils/array-utils.js"></script>
  <script src="../assets/js/utils/categories.js"></script>
  <script src="../assets/js/utils/engines.js"></script>
  <script src="../assets/js/utils/modes.js"></script>
  <script src="../assets/js/utils/restrictions.js"></script>
  <script src="../assets/js/utils/tracks.js"></script>
  <script src="../assets/js/utils/charts.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/goal-progress.js"></script>
</body>
</html>
