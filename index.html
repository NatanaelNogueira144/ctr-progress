<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTR Progress</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/x-icon">
</head>
<body>
  <div class="background-wrapper">
    <img id="background" src="assets/images/tracks/Menu.png" alt="Background" class="background-image" />
  </div>

  <main class="content">
    <div class="logo-wrapper">
      <img class="logo" src="assets/images/logo.png" alt="">
    </div>

    <h1 class="orange">CTR Progress</h1>

    <p>
      Press <span class="orange">M</span> to go to the main page
    </p>
    <p>
      Press <span class="orange">G</span> to go to the goals report page
    </p>
    <p>
      Press <span class="orange">Escape</span> to return to this page
    </p>
  </main>

  <script src="assets/js/controls.js"></script>
</body>
</html>
